id: use_mention_01
description: |
  *Use-mention* template: the room contains both the ENTITY baba and the
  WORD "BABA". The agent must learn to push the WORD (not step on the
  entity), distinguishing the symbol from its referent.
height: 6
width: 10
max_steps: 30
rows:
  - "# # # # # # # # # #"
  - "# BABA IS YOU . . . . . #"
  - "# b . . . FLAG IS WIN . #"
  - "# . . . . . F . . #"
  - "# . . . . . . . . #"
  - "# # # # # # # # # #"
